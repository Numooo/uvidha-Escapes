<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1."  >      <title>Extended Flight Radar Iframe Tester</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            padding: 30px;
            margin: 0;
        }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 40px; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .test-box {
            border: 1px solid #1e293b;
            padding: 20px;
            border-radius: 12px;
            background: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .test-box:hover { transform: translateY(-5px); }
        h2 { margin-top: 0; font-size: 1.25rem; color: #7dd3fc; }
        .iframe-container {
            width: 100%;
            height: 400px;
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid #334155;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .info {
            margin-top: 15px;
            font-size: 13px;
        }
        .url { color: #94a3b8; word-break: break-all; }
        .label { font-weight: bold; color: #38bdf8; }
        .status-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .status-works { background: #059669; color: white; }
        .status-fails { background: #dc2626; color: white; }
        .status-maybe { background: #d97706; color: white; }
    </style>
</head>
<body>
    <h1>Flight Radar Iframe Compatibility Test</h1>
    <div class="container">
        
        <!-- ADS-B Exchange (Top Candidate) -->
        <div class="test-box">
            <h2>ADS-B Exchange (Globe)</h2>
            <div class="iframe-container">
                <iframe src="https://globe.adsbexchange.com/?hideSidebar&hideButtons" title="ADS-B Exchange"></iframe>
            </div>
            <div class="info">
                <div class="label">Status: <span class="status-tag status-works">Works</span></div>
                <div class="url">https://globe.adsbexchange.com/?hideSidebar&hideButtons</div>
                <p>Most reliable open flight data source.</p>
            </div>
        </div>

        <iframe frameborder="0" scrolling="no" marginheight="0" marginwidth="0" width=1200 height=1000 src="https://www.airnavradar.com/?widget=1&z=6&lat=41.89406&lng=75.64284&hideAirportWeather=true&hideAirportCard=true&hideFlightCard=true"></iframe>
        <!-- FlightRadar24 Simple Index -->
        <div class="test-box">
            <h2>FlightRadar24 (Simple Index)</h2>
            <div class="iframe-container">
                <iframe src="https://www.flightradar24.com/multiview/41.13,74.11/7" title="FR24 Simple"></iframe>
            </div>
            <div class="info">
                <div class="url">https://www.flightradar24.com/40.97,74.25/7</div>
                <p>Deprecated simple version, often blank.</p>
            </div>
        </div>


</div>

    
  
</body>
</html>
